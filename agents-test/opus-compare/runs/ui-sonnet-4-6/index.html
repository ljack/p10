<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div data-testid="app-root" id="app-root">

    <div data-testid="error-banner" id="error-banner" hidden>
      <span class="error-message"></span>
      <button data-testid="error-banner-dismiss" aria-label="Dismiss error">✕</button>
    </div>

    <header>
      <h1>📋 Todo App</h1>
      <div class="api-base-row">
        <label for="api-base-input">API base</label>
        <input
          data-testid="api-base-input"
          id="api-base-input"
          aria-label="API base URL"
          type="text"
          spellcheck="false"
        />
        <span
          data-testid="api-base-status"
          id="api-base-status"
          data-status="down"
          title="API health"
        ></span>
      </div>
    </header>

    <main>
      <form data-testid="add-form" id="add-form" novalidate>
        <input
          data-testid="add-input"
          id="add-input"
          aria-label="New todo title"
          type="text"
          placeholder="What needs to be done?"
          autocomplete="off"
        />
        <button data-testid="add-submit" type="submit">Add</button>
        <span data-testid="add-error" id="add-error" role="alert" hidden></span>
      </form>

      <ul data-testid="todo-list" id="todo-list"></ul>
      <p data-testid="empty-state" id="empty-state" hidden>No todos yet. Add one above.</p>
    </main>

  </div>
  <script src="app.js"></script>
</body>
</html>
